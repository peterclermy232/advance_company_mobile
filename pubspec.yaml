name: advance_company
description: Production-grade Flutter app for Advance Company - Django backend integration

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.2.0

  # HTTP & networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # UI
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true