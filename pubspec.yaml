name: saccoapp
description: A SACCO mobile application built with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.1

  # HTTP
  http: ^1.2.1
  http_parser: ^4.0.2
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  # Secure storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.5

  # File picking
  file_picker: ^8.0.3

  # Connectivity
  connectivity_plus: ^7.1.1

  # Formatting
  intl: ^0.19.0
  google_fonts: ^8.1.0

  # Icons
  cupertino_icons: ^1.0.6
  equatable: any
  fl_chart: any
  local_auth: any
  image_picker: any
  flutter_local_notifications: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true